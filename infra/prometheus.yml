global:
  scrape_interval: 15s

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ["backend:8000"]
  - job_name: signal_workers
    static_configs:
      - targets: ["signal_workers:9100"]
  - job_name: execution_engine
    static_configs:
      - targets: ["execution_engine:9101"]
